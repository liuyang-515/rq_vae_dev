# Hydra configuration

hydra:
  run:
    dir: ./logs/${now:%Y-%m-%d}_${now:%H-%M-%S}/${task.name}
  sweep:
    dir: ./logs/sweeps/${now:%Y-%m-%d}_${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  job_logging:
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.run.dir}/output.log
    root:
      level: INFO
      handlers: [console, file]